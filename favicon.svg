<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Orange accent bar top -->
  <rect x="0" y="0" width="64" height="5" rx="3" fill="#F97316"/>
  <!-- UG letters -->
  <text x="10" y="44" font-family="Arial Black,sans-serif" font-weight="900" font-size="30" fill="#F97316">UG</text>
  <!-- Admission underline tag -->
  <rect x="8" y="48" width="48" height="9" rx="3" fill="#F97316" opacity="0.2"/>
  <text x="32" y="55" text-anchor="middle" font-family="Arial,sans-serif" font-weight="700" font-size="7" fill="#F97316" letter-spacing="1">ADMISSION</text>
</svg>